version: '3.8'

services:
  db_dev:
    image: postgres:16
    container_name: ecommerce_db_dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ecommerce_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  db_test:
    image: postgres:16
    container_name: ecommerce_db_test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ecommerce_test
    ports:
      - "5433:5432"
    # Sem volumes para garantir que os dados sejam descartáveis conforme o requisito
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce_test"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data: